<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>南昌历史云志・八一发展脉络</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>

<style type="text/tailwindcss">
    @layer utilities {
        .font-kai {font-family: "KaiTi", "STKaiti", "楷体", serif;}
        .font-song {font-family: "SimSun", "STSong", "宋体", serif;}
    }
</style>

<style>
/* 全局背景全屏铺满 */
body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: url('/img/bg_scroll.jpg') no-repeat center;
  background-size: 100% 100%;
  background-attachment: fixed;
  background-color: #f5efe0;
  font-family: "KaiTi", "STKaiti", serif;
  overflow-x: auto;
  overflow-y: hidden;
}

/* 标题不动 */
.page-title {
  text-align: center;
  padding: 30px 0 10px;
  font-size: 2.4rem;
  color: #5c2b2b;
  margin: 0;
}

/* 时间轴整体左移，露出第一个卡片 */
.timeline-container {
  display: flex;
  align-items: center;
  min-width: max-content;
  padding-left: 80px;
  padding-top: 120px;
  padding-bottom: 120px;
  gap: 160px;
  position: relative;

  /* 大幅度古风波浪曲线 */
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="200" viewBox="0 0 2000 200"><path d="M0,100 C400,30 600,170 1000,100 C1400,30 1600,170 2000,100" fill="none" stroke="%238B2F2F" stroke-width="5" stroke-linecap="round"/></svg>');
  background-repeat: repeat-x;
  background-position: center;
  background-size: 2000px 200px;
}

/* 时间节点结构 */
.timeline-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* 圆点：严格居中贴在曲线 */
.dot {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: #a84444;
  border: 4px solid #f5efe0;
  box-shadow: 0 0 0 2px #8B2F2F;
  z-index: 10;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
}

/* 卡片：放大 2 倍 + 留白加大 + 无边框半透明 */
.card {
  width: 340px;
  padding: 32px;
  background: rgba(255,253,245,0.8);
  border-radius: 18px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.1);
  border: none;
  line-height: 1.6;
}

/* 文字放大 2 倍 */
.card-year {
  font-size: 22px !important;
  font-weight: bold;
  color: #8B2F2F;
  margin-bottom: 8px;
}
.card-title {
  font-size: 24px !important;
  font-weight: bold;
  color: #6B3A2B;
  margin-bottom: 12px;
}
.card-desc {
  font-size: 20px !important;
  color: #3a2b1c;
  margin-bottom: 16px;
}
.card-link {
  font-size: 20px !important;
  color: #A04040;
  text-decoration: none;
}
.card-link:hover {
  text-decoration: underline;
}

/* 卡片上下交替均匀分布 */
.timeline-item:nth-child(odd) .card {
  margin-bottom: 140px;
}
.timeline-item:nth-child(even) .card {
  margin-top: 140px;
}

</style>
</head>

<body class="font-song">

<!-- 顶部标题 -->
<h1 class="page-title font-kai">南昌历史云志・八一发展脉络</h1>
<p class="text-center text-lg text-[#6D4B36] font-kai">英雄城・一九二七・风云激荡</p>

<!-- 时间轴主体 -->
<div class="timeline-container" id="timelineDataWrapper"></div>



<script>
$(document).ready(function () {
    $.ajax({
        url: "/api/timeline",
        type: "GET",
        success: function (list) {
            let html = "";
            list.forEach((item, index) => {
                const timePoint = item.timePoint || "";
                const eventName = item.eventName || "";
                const description = item.description || "";
                const eventId = item.eventId || "";

                html += `
                <div class="timeline-item">
                    <div class="card font-kai">
                        <div class="card-year">${timePoint}</div>
                        <div class="card-title">${eventName}</div>
                        <div class="card-desc">${description}</div>
                        <a href="event-detail.html?id=${eventId}" class="card-link">查看详情</a>
                    </div>
                    <div class="dot"></div>
                </div>
                `;
            });
            $("#timelineDataWrapper").html(html);
        }
    });
});
</script>

</body>
</html>
