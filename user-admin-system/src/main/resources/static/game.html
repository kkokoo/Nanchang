    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }

        /* ========== 游戏核心：卡牌翻转 CSS（经过测试可运行） ========== */
        .flip-card {
            perspective: 1000px;
            height: 110px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            text-align: center;
        }
        .flip-card.is-flipped .flip-card-inner {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 8px;
        }
        .flip-card-front {
            background: linear-gradient(135deg, #C53030, #9B2424);
            color: white;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
        }
        .flip-card-front:hover {
            background: linear-gradient(135deg, #9B2424, #7C1D1D);
        }
        .flip-card-back {
            background-color: white;
            border: 2px solid #FCA5A5;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
        }
        .flip-card-back.blue-border {
            border-color: #93C5FD;
        }
        .flip-card.matched {
            opacity: 0.35;
            cursor: default;
        }

        /* ========== 游戏切换 ========== */
        .game-tab { display: none; }
        .game-tab.active { display: block; }
        .game-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(197, 48, 48, 0.2);
        }

        /* ========== 问答按钮 ========== */
        .quiz-btn {
            transition: all 0.2s ease;
        }
        .quiz-btn:hover:not(:disabled) {
            background-color: #FEF2F2;
            border-color: #F87171;
        }
    </style>
</head>

        <!-- 游戏3：红色主题记忆翻牌 -->
        <div id="game-memory" class="game-tab">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="text-center mb-4">

                    <p class="text-gray-600 text-sm mb-3">找出两张相同词汇的卡片，配对消除！</p>
                    <div class="flex justify-center gap-10 text-lg">
                        <div>得分：<span id="memory-score" class="text-red-600 font-bold text-xl">0</span></div>
                        <div>剩余配对：<span id="memory-remain" class="text-red-600 font-bold text-xl">8</span></div>
                    </div>
                    <button onclick="initMemoryGame()" class="mt-3 text-sm text-red-600 hover:text-red-700 underline">🔄 重新开始</button>
                </div>

        <!-- 通用胜利弹窗 -->
        <div id="winModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-[100]">

                <p id="winScore" class="mb-6 text-lg text-gray-700"></p>
                <button onclick="restartCurrentGame()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition font-medium">
                    再玩一次

    <script>
        /* ========== 游戏切换 ========== */
        var currentGame = 'pair';
        function switchGame(gameName) {
            currentGame = gameName;
            var tabs = document.querySelectorAll('.game-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            var btns = document.querySelectorAll('.game-tab-btn');
            for (var j = 0; j < btns.length; j++) {
                btns[j].classList.remove('bg-red-600', 'text-white');
                btns[j].classList.add('bg-gray-300', 'text-gray-800');
            }
            document.getElementById('game-' + gameName).classList.add('active');
            var btn = document.getElementById('btn-' + gameName);
            btn.classList.remove('bg-gray-300', 'text-gray-800');
            btn.classList.add('bg-red-600', 'text-white');
        }

        /* ========== 通用工具函数 ========== */
        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr;
        }

        function showWinModal(title, score) {
            document.getElementById('winTitle').innerText = title;
            document.getElementById('winScore').innerText = '最终得分：' + score + ' 分';
            document.getElementById('winModal').classList.remove('hidden');
        }

        function closeWinModal() {
            document.getElementById('winModal').classList.add('hidden');
        }

        function restartCurrentGame() {
            closeWinModal();
            if (currentGame === 'pair') initPairGame();
            else if (currentGame === 'quiz') initQuizGame();
            else if (currentGame === 'memory') initMemoryGame();
        }

        /* =================== 游戏1：历史人物&事件配对 =================== */
        var pairData = [
            { event: "八一南昌起义", person: "周恩来" },
            { event: "八一南昌起义", person: "贺龙" },
            { event: "灌婴筑城", person: "灌婴" },
            { event: "滕王阁始建", person: "李元婴" },
            { event: "洪都之战", person: "朱文正" },
            { event: "王守仁平叛", person: "王守仁" },
            { event: "新四军进驻南昌", person: "叶挺" },
            { event: "创办《新江西》", person: "袁玉冰" }
        ];

        var pairCards = [];
        pairData.forEach(function(item, idx) {
            pairCards.push({ id: 'p' + idx, type: 'event', text: item.event });
            pairCards.push({ id: 'p' + idx, type: 'person', text: item.person });
        });

        var pairFirst = null;
        var pairLock = false;
        var pairScore = 0;
        var pairRemain = 0;

        function initPairGame() {
            var box = document.getElementById('pair-gameBox');
            box.innerHTML = '';
            pairFirst = null;
            pairLock = false;
            pairScore = 0;
            pairRemain = pairData.length;
            document.getElementById('pair-score').innerText = pairScore;
            document.getElementById('pair-remain').innerText = pairRemain;

            var shuffled = shuffle(pairCards.slice());

            for (var i = 0; i < shuffled.length; i++) {
                var item = shuffled[i];
                var card = document.createElement('div');
                card.className = 'flip-card';
                card.dataset.pairid = item.id;
                card.dataset.type = item.type;

                var borderClass = item.type === 'event' ? '' : 'blue-border';

                card.innerHTML =
                    '<div class="flip-card-inner">' +
                        '<div class="flip-card-front">?</div>' +
                        '<div class="flip-card-back ' + borderClass + '">' + item.text + '</div>' +
                    '</div>';

                card.onclick = function(cardEl) {
                    return function() {
                        if (pairLock || cardEl.classList.contains('is-flipped') || cardEl.classList.contains('matched')) return;
                        cardEl.classList.add('is-flipped');
                        if (!pairFirst) {
                            pairFirst = cardEl;
                        } else {
                            pairLock = true;
                            if (pairFirst.dataset.pairid === cardEl.dataset.pairid && pairFirst.dataset.type !== cardEl.dataset.type) {
                                // 配对成功
                                pairScore += 20;
                                pairRemain--;
                                document.getElementById('pair-score').innerText = pairScore;
                                document.getElementById('pair-remain').innerText = pairRemain;
                                setTimeout(function() {
                                    pairFirst.classList.add('matched');
                                    cardEl.classList.add('matched');
                                    pairLock = false;
                                    pairFirst = null;
                                    if (pairRemain <= 0) {
                                        setTimeout(function() { showWinModal('🎉 历史配对完成！', pairScore); }, 500);
                                    }
                                }, 700);
                            } else {
                                // 配对失败
                                setTimeout(function() {
                                    pairFirst.classList.remove('is-flipped');
                                    cardEl.classList.remove('is-flipped');
                                    pairLock = false;
                                    pairFirst = null;
                                }, 1200);
                            }
                        }
                    };
                }(card);

                box.appendChild(card);
            }
        }

        /* =================== 游戏2：红色知识问答 =================== */
        var quizData = [
            { q: '南昌起义发生在哪一年？', options: ['1926年', '1927年', '1928年', '1929年'], answer: 1, tip: '八一南昌起义，打响了武装反抗国民党反动派的第一枪。' },
            { q: '南昌起义的主要领导人之一是？', options: ['孙中山', '周恩来', '邓小平', '陈毅'], answer: 1, tip: '周恩来、贺龙、叶挺、朱德、刘伯承等领导了南昌起义。' },
            { q: '灌婴筑城建立南昌城，是在哪个朝代？', options: ['秦朝', '西汉', '东汉', '三国'], answer: 1, tip: '公元前202年，西汉大将灌婴在此筑城，称为灌城。' },
            { q: '滕王阁是谁修建的？', options: ['王勃', '李元婴', '韩愈', '苏轼'], answer: 1, tip: '唐永徽四年（653年），唐太宗之弟李元婴任洪州都督时建造。' },
            { q: '滕王阁序的作者是？', options: ['李白', '杜甫', '王勃', '白居易'], answer: 2, tip: '王勃在滕王阁上写下了千古名篇《滕王阁序》。' },
            { q: '井冈山会师发生在哪一年？', options: ['1927年', '1928年', '1929年', '1930年'], answer: 1, tip: '1928年4月，朱德、陈毅率部与毛泽东在井冈山胜利会师。' },
            { q: '被誉为"英雄城"的是哪座城市？', options: ['北京', '上海', '南昌', '广州'], answer: 2, tip: '南昌因八一南昌起义被誉为"英雄城"，是军旗升起的地方。' },
            { q: '新四军军部进驻南昌是在哪一年？', options: ['1937年', '1938年', '1939年', '1940年'], answer: 0, tip: '1937年12月，新四军军部在汉口成立，后移驻南昌。' },
            { q: '《新江西》半月刊是谁创办的？', options: ['袁玉冰', '方志敏', '赵醒侬', '以上都是'], answer: 3, tip: '1922年，袁玉冰、方志敏、赵醒侬等创办《新江西》，宣传革命思想。' },
            { q: '洪都之战是哪位将领以少胜多的经典战役？', options: ['朱文正', '王守仁', '朱元璋', '陈友谅'], answer: 0, tip: '1363年，朱元璋侄子朱文正在洪都（南昌）以2万兵力抵御陈友谅60万大军。' }
        ];

        var quizIndex = 0;
        var quizScore = 0;

        function initQuizGame() {
            quizIndex = 0;
            quizScore = 0;
            document.getElementById('quiz-score').innerText = quizScore;
            document.getElementById('quiz-index').innerText = quizIndex + 1;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            var q = quizData[quizIndex];
            document.getElementById('quiz-question').innerText = '第 ' + (quizIndex + 1) + ' 题：' + q.q;
            var optionsBox = document.getElementById('quiz-options');
            optionsBox.innerHTML = '';
            var letters = ['A', 'B', 'C', 'D'];

            for (var i = 0; i < q.options.length; i++) {
                (function(idx) {
                    var btn = document.createElement('button');
                    btn.className = 'quiz-btn w-full py-3 px-4 border-2 border-gray-300 rounded-lg text-left text-gray-800 font-medium flex items-center gap-3';
                    btn.innerHTML = '<span class="inline-block w-8 h-8 rounded-full bg-red-100 text-red-600 font-bold text-center leading-8 flex-shrink-0">' + letters[idx] + '</span>' + q.options[idx];
                    btn.onclick = function() {
                        var allBtns = optionsBox.querySelectorAll('button');
                        for (var b = 0; b < allBtns.length; b++) {
                            allBtns[b].setAttribute('disabled', 'true');
                        }

                        if (idx === q.answer) {
                            btn.classList.remove('border-gray-300');
                            btn.classList.add('border-green-500', 'bg-green-50');
                            quizScore += 20;
                            document.getElementById('quiz-score').innerText = quizScore;
                            var tipBox = document.createElement('div');
                            tipBox.className = 'mt-3 p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-800';
                            tipBox.innerText = '✅ 正确！' + q.tip;
                            optionsBox.appendChild(tipBox);
                        } else {
                            btn.classList.remove('border-gray-300');
                            btn.classList.add('border-red-500', 'bg-red-50');
                            allBtns[q.answer].classList.remove('border-gray-300');
                            allBtns[q.answer].classList.add('border-green-500', 'bg-green-50');
                            var tipBox2 = document.createElement('div');
                            tipBox2.className = 'mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-800';
                            tipBox2.innerText = '❌ 正确答案是 ' + letters[q.answer] + '。' + q.tip;
                            optionsBox.appendChild(tipBox2);
                        }

                        setTimeout(function() {
                            quizIndex++;
                            if (quizIndex >= quizData.length) {
                                showWinModal('🎉 问答挑战完成！', quizScore);
                            } else {
                                document.getElementById('quiz-index').innerText = quizIndex + 1;
                                showQuizQuestion();
                            }
                        }, 2500);
                    };
                    optionsBox.appendChild(btn);
                })(i);
            }
        }

        /* =================== 游戏3：红色主题记忆翻牌 =================== */
        var memoryWords = ['红军', '长征', '井冈山', '八一', '南昌起义', '革命', '英雄城', '军旗升起'];
        var memoryFirst = null;
        var memoryLock = false;
        var memoryScore = 0;
        var memoryRemain = 0;

        function initMemoryGame() {
            var box = document.getElementById('memory-gameBox');
            box.innerHTML = '';
            memoryFirst = null;
            memoryLock = false;
            memoryScore = 0;
            memoryRemain = memoryWords.length;
            document.getElementById('memory-score').innerText = memoryScore;
            document.getElementById('memory-remain').innerText = memoryRemain;

            var cards = [];
            for (var i = 0; i < memoryWords.length; i++) {
                cards.push(memoryWords[i]);
                cards.push(memoryWords[i]);
            }

            var shuffled = shuffle(cards);

            for (var j = 0; j < shuffled.length; j++) {
                (function(word) {
                    var card = document.createElement('div');
                    card.className = 'flip-card';
                    card.dataset.word = word;
                    card.innerHTML =
                        '<div class="flip-card-inner">' +
                            '<div class="flip-card-front">?</div>' +
                            '<div class="flip-card-back">' + word + '</div>' +
                        '</div>';

                    card.onclick = function() {
                        if (memoryLock || card.classList.contains('is-flipped') || card.classList.contains('matched')) return;
                        card.classList.add('is-flipped');
                        if (!memoryFirst) {
                            memoryFirst = card;
                        } else {
                            memoryLock = true;
                            if (memoryFirst.dataset.word === card.dataset.word) {
                                memoryScore += 15;
                                memoryRemain--;
                                document.getElementById('memory-score').innerText = memoryScore;
                                document.getElementById('memory-remain').innerText = memoryRemain;
                                setTimeout(function() {
                                    memoryFirst.classList.add('matched');
                                    card.classList.add('matched');
                                    memoryLock = false;
                                    memoryFirst = null;
                                    if (memoryRemain <= 0) {
                                        setTimeout(function() { showWinModal('🎉 记忆配对成功！', memoryScore); }, 500);
                                    }
                                }, 700);
                            } else {
                                setTimeout(function() {
                                    memoryFirst.classList.remove('is-flipped');
                                    card.classList.remove('is-flipped');
                                    memoryLock = false;
                                    memoryFirst = null;
                                }, 1200);
                            }
                        }
                    };
                    box.appendChild(card);
                })(shuffled[j]);
            }
        }

        /* ========== 页面加载后初始化游戏 ========== */
        initPairGame();
        initQuizGame();
        initMemoryGame();
    </script>
</body>
</html>
