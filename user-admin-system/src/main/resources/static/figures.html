<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>陈列英雄 - 历史人物名录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .figure-card {
            display: none;
        }
    </style>
    <script>
        $(document).ready(function () {
            let allFigures = [];
            let currentCategory = 'all';
            let searchQuery = '';

            const ancientDynasties = ['西汉', '西晋', '唐朝', '五代十国（南唐）', '元末明初', '元末', '明朝', '清朝'];
            const modernDynasties = ['清末民初', '民国', '民国/中华人民共和国', '中华人民共和国'];

            function renderFigures() {
                let filtered = allFigures.filter(function (person) {
                    // 1. 姓名过滤
                    if (searchQuery && person.name.indexOf(searchQuery) === -1) {
                        return false;
                    }
                    // 2. 朝代分类过滤
                    if (currentCategory === 'ancient') {
                        return ancientDynasties.includes(person.dynasty);
                    } else if (currentCategory === 'modern') {
                        return modernDynasties.includes(person.dynasty);
                    }
                    return true;
                });

                let html = '';
                if (filtered.length > 0) {
                    filtered.forEach(function (person) {
                        let cover = person.cover || 'https://via.placeholder.com/400x400?text=暂无图片';
                        let title = person.relatedEvent || person.birthDeath || '';
                        let intro = person.biography || '';
                        html += `
                        <div class="group figure-card" style="display: block;">
                            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden mb-4 relative shadow-md group-hover:shadow-red-200 group-hover:shadow-2xl transition duration-500">
                                <img alt="${person.name}" class="w-full h-full object-cover" src="${cover}"/>
                                <div class="absolute inset-0 bg-red-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                    <a class="bg-white text-red-600 px-6 py-2 rounded-full font-bold text-sm transform translate-y-4 group-hover:translate-y-0 transition duration-300" href="figure-detail.html?id=${person.personId}">查看生平</a>
                                </div>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800">${person.name}</h3>
                            <p class="text-red-700 text-xs font-bold mb-2">${title}</p>
                            <p class="text-gray-500 text-xs line-clamp-2 leading-relaxed">${intro}</p>
                        </div>
                        `;
                    });
                } else {
                    html = '<div class="col-span-full text-center text-gray-500 py-10">未找到相关人物</div>';
                }
                $('#figures-container').html(html);
            }

            function fetchAllFigures() {
                $.ajax({
                    url: '/api/person/list',
                    type: 'GET',
                    success: function (data) {
                        allFigures = data || [];
                        renderFigures();
                    },
                    error: function () {
                        $('#figures-container').html('<div class="col-span-full text-center text-red-500 py-10">加载失败，请稍后重试</div>');
                    }
                });
            }

            // 初始加载
            fetchAllFigures();

            // 分类切换
            window.filterFigures = function (category, el) {
                $('.filter-btn').removeClass('bg-red-800 text-white').addClass('border text-gray-600 hover:bg-white');
                $(el).removeClass('border text-gray-600 hover:bg-white').addClass('bg-red-800 text-white');

                currentCategory = category;
                renderFigures();
            };
        });
    </script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
    </style>
</head>

<body class="bg-[#FAF9F6]">

            </div>
            <div class="hidden md:flex space-x-8 text-gray-600 font-medium">

                <a class="hover:text-red-600" href="special-81.html">八一专题</a>

                <a class="hover:text-red-600" href="faq.html">用户留言</a>

            </div>
            <div class="flex items-center space-x-4">
                <a class="p-2 text-gray-500 hover:bg-gray-100 rounded-full" href="search.html"><span class="iconify text-xl" data-icon="ri:search-line"></span></a>
                <a class="bg-red-accent text-white px-4 py-2 rounded-md text-sm hover:bg-red-700 transition" href="admin-login.html">后台管理</a>

        </div>
    </nav>
    <header class="text-center py-20 pb-0">
        <h1 class="text-5xl font-black mb-4">星灿南昌</h1>
        <p class="text-gray-500 max-w-xl mx-auto">在这片红色的土地上，无数英雄儿女留下了不可磨灭的印记。他们是历史的创造者，更是民族的脊梁。</p>
        <div class="flex justify-center space-x-4 mt-8">
            <button onclick="filterFigures('ancient', this)"
                class="filter-btn px-4 py-1 border text-gray-600 rounded text-xs hover:bg-white transition cursor-pointer">古代人物</button>
            <button onclick="filterFigures('modern', this)"
                class="filter-btn px-4 py-1 border text-gray-600 rounded text-xs hover:bg-white transition cursor-pointer">近现代人物</button>
            <button onclick="filterFigures('all', this)"
                class="filter-btn px-4 py-1 bg-red-800 text-white rounded text-xs cursor-pointer">显示全部</button>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-4 py-20">
        <div id="figures-container" class="grid grid-cols-2 md:grid-cols-4 gap-x-8 gap-y-16">
            <!-- 动态加载人物 -->
            <div class="col-span-full text-center text-gray-500">正在加载人物数据...</div>

    <footer class="bg-neutral-900 text-neutral-500 py-12 px-6">
