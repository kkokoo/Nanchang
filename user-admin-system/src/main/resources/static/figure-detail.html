<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>历史人物详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
    </style>
</head>
<body class="bg-[#FAF9F6] font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <a href="figures.html" class="flex items-center space-x-2 text-gray-600 hover:text-red-600 transition font-bold">
                <span class="iconify text-xl" data-icon="ri:arrow-left-line"></span>
                <span>返回人物列表</span>
            </a>
            <div class="text-xl font-bold tracking-wider text-gray-800">
                英雄人物档案
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12" id="detailContainer">
        <div class="text-center py-12">加载中...</div>
    </main>

    <script>
        $(document).ready(function () {
            const urlParams = new URLSearchParams(window.location.search);
            const personId = urlParams.get('id');

            if (!personId) {
                $('#detailContainer').html('<div class="text-center py-12 text-red-500">无效的人物ID</div>');
                return;
            }

            $.ajax({
                url: "/api/person/" + personId,
                type: "GET",
                success: function (p) {
                    const imgUrl = p.cover || "https://via.placeholder.com/400x400?text=暂无图片";
                    $('title').text(p.name + ' - 历史人物详情');
                    
                    const html = `
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                        <div class="h-48 bg-red-900 relative">
                            <div class="absolute inset-0 opacity-20 bg-cover bg-center" style="background-image: url('${imgUrl}')"></div>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        </div>
                        
                        <div class="px-8 pb-8 relative">
                            <div class="flex flex-col md:flex-row items-end -mt-20 mb-8 space-y-4 md:space-y-0 md:space-x-8">
                                <img src="${imgUrl}" alt="${p.name}" class="w-40 h-40 object-cover rounded-xl border-4 border-white shadow-xl relative z-10" />
                                <div class="flex-1">
                                    <h1 class="text-4xl font-black text-gray-800">${p.name}</h1>
                                    <p class="text-red-700 font-bold mt-2 text-lg">${p.relatedEvent || p.dynasty}</p>
                                </div>
                                <div class="flex space-x-3 mt-4">
                                    <button onclick="handleFavorite(${p.personId}, '${p.name}')" id="collectBtn" class="px-6 py-2 bg-red-700 text-white rounded-md font-bold shadow hover:bg-red-800 transition flex items-center">
                                        <span class="iconify mr-2" data-icon="ri:star-line"></span> 收藏档案
                                    </button>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div class="col-span-2 space-y-8">
                                    <section>
                                        <h2 class="text-2xl font-bold border-b-2 border-red-700 pb-2 mb-4 inline-block">生平简介</h2>
                                        <p class="text-gray-700 leading-relaxed text-justify indent-8 whitespace-pre-line">${p.biography || '暂无介绍'}</p>
                                    </section>
                                    ${p.contribution ? `
                                    <section>
                                        <h2 class="text-2xl font-bold border-b-2 border-red-700 pb-2 mb-4 inline-block">主要贡献 / 事迹</h2>
                                        <p class="text-gray-700 leading-relaxed text-justify indent-8 whitespace-pre-line">${p.contribution}</p>
                                    </section>` : ''}

                                    <!-- 相关事件区域 -->
                                    <section id="relatedEventsSection" class="hidden">
                                        <h2 class="text-2xl font-bold border-b-2 border-red-700 pb-2 mb-4 inline-block flex items-center">
                                            <span class="iconify text-red-600 mr-2" data-icon="ri:calendar-event-line"></span>
                                            相关事件
                                        </h2>
                                        <div id="relatedEventsList" class="space-y-3">
                                        </div>
                                    </section>
                                </div>
                                <div class="col-span-1 space-y-6">
                                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-100">
                                        <h3 class="font-bold text-gray-800 mb-4 flex items-center">
                                            <span class="iconify text-red-600 mr-2" data-icon="ri:information-line"></span> 核心信息
                                        </h3>
                                        <ul class="space-y-3 text-sm text-gray-600">
                                            <li class="flex justify-between border-b pb-2">
                                                <span class="text-gray-400">朝代</span>
                                                <span class="font-medium text-right">${p.dynasty || '未知'}</span>
                                            </li>
                                            <li class="flex justify-between border-b pb-2">
                                                <span class="text-gray-400">生卒年</span>
                                                <span class="font-medium text-right">${p.birthDeath || '未知'}</span>
                                            </li>
                                            <li class="flex justify-between border-b pb-2">
                                                <span class="text-gray-400">资料来源</span>
                                                <span class="font-medium text-right">${p.source || '未知'}</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                    $('#detailContainer').html(html);

                    // 加载相关事件
                    loadRelatedEvents(personId);

                    // 检查收藏状态
                    checkCollectStatus(personId, 'person');
                },
                error: function () {
                    $('#detailContainer').html(`
                        <div class="text-center py-12">
                            <p class="text-red-500 mb-4">详情加载失败</p>
                            <a href="figures.html" class="inline-block bg-gray-200 px-6 py-2 rounded hover:bg-gray-300 transition">返回列表</a>
                        </div>
                    `);
                }
            });
        });

        // 加载相关事件
        function loadRelatedEvents(personId) {
            $.ajax({
                url: '/api/person/' + personId + '/related-events',
                type: 'GET',
                success: function(events) {
                    if (events && events.length > 0) {
                        let html = '';
                        events.forEach(function(e) {
                            html += `
                                <a href="event-detail.html?id=${e.eventId}" 
                                   class="flex items-center justify-between p-4 border rounded-lg hover:bg-red-50 hover:border-red-300 transition group">
                                    <div class="flex items-center space-x-3">
                                        <span class="iconify text-red-600 text-xl" data-icon="ri:calendar-event-fill"></span>
                                        <div>
                                            <p class="font-bold text-gray-800 group-hover:text-red-700 transition">${e.eventName}</p>
                                            <p class="text-xs text-gray-500">${e.dynasty || ''} · ${e.occurTime || ''}</p>
                                        </div>
                                    </div>
                                    <span class="iconify text-gray-400 group-hover:text-red-600 transition" data-icon="ri:arrow-right-s-line"></span>
                                </a>
                            `;
                        });
                        $('#relatedEventsList').html(html);
                        $('#relatedEventsSection').removeClass('hidden');
                    }
                }
            });
        }

        // 收藏人物
        function handleFavorite(personId, personName) {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                alert('请先登录后收藏！');
                window.location.href = 'admin-login.html';
                return;
            }
            const user = JSON.parse(userStr);

            $.ajax({
                url: '/api/collect/add',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    userId: user.userId,
                    contentType: 'person',
                    contentId: personId,
                    folderName: '默认收藏夹'
                }),
                success: function(res) {
                    if (res.code === 1) {
                        alert('收藏成功！');
                        $('#collectBtn').html('<span class="iconify mr-2" data-icon="ri:star-fill"></span> 已收藏');
                        $('#collectBtn').removeClass('bg-red-700 hover:bg-red-800').addClass('bg-gray-500');
                    } else {
                        alert(res.msg || '收藏失败');
                    }
                },
                error: function() {
                    alert('收藏失败，请稍后重试');
                }
            });
        }

        // 检查收藏状态
        function checkCollectStatus(contentId, contentType) {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return;
            const user = JSON.parse(userStr);

            $.ajax({
                url: '/api/collect/check?userId=' + user.userId + '&contentType=' + contentType + '&contentId=' + contentId,
                type: 'GET',
                success: function(res) {
                    if (res.code === 1 && res.data === true) {
                        $('#collectBtn').html('<span class="iconify mr-2" data-icon="ri:star-fill"></span> 已收藏');
                        $('#collectBtn').removeClass('bg-red-700 hover:bg-red-800').addClass('bg-gray-500');
                    }
                }
            });
        }
    </script>
</body>
</html>
