<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>我的 - 用户中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
        .tab-active { border-bottom-color: #C53030; color: #C53030; }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold tracking-wider text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="index.html">首页</a>
                <a class="hover:text-red-600" href="events.html">历史事件</a>
                <a class="hover:text-red-600" href="special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="figures.html">历史人物</a>
                <a class="hover:text-red-600" href="timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="faq.html">用户留言</a>
                <a class="hover:text-red-600" href="quiz.html">互动答题</a>
                <a class="hover:text-red-600" href="about.html">关于我们</a>
                <a class="red-accent border-b-2 border-red-600" href="profile.html">我的</a>
            </div>
        </div>
    </nav>

    <!-- 未登录提示 -->
    <div id="loginPrompt" class="hidden">
        <main class="max-w-2xl mx-auto px-4 py-24 text-center">
            <div class="bg-white rounded-2xl shadow-lg p-12">
                <span class="iconify text-6xl text-red-300 mb-6 inline-block" data-icon="ri:user-unfollow-line"></span>
                <h2 class="text-2xl font-bold text-gray-800 mb-4">您尚未登录</h2>
                <p class="text-gray-500 mb-8">登录后即可查看个人信息、管理收藏夹和查看提问记录</p>
                <a href="admin-login.html" class="inline-block bg-red-600 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-red-700 transition shadow-md">
                    <span class="iconify inline-block mr-2" data-icon="ri:login-box-line"></span>立即登录
                </a>
                <div class="mt-4">
                    <a href="register.html" class="text-red-600 hover:underline text-sm">还没有账号？立即注册</a>
                </div>
            </div>
        </main>
    </div>

    <!-- 已登录内容 -->
    <div id="loggedInContent" class="hidden">
        <main class="max-w-5xl mx-auto px-4 py-12">
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <!-- 头部信息 -->
                <div class="bg-red-800 p-8 flex items-center justify-between text-white">
                    <div class="flex items-center space-x-6">
                        <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center text-red-800 overflow-hidden border-4 border-red-900/30">
                            <span class="iconify text-5xl" data-icon="ri:user-smile-line"></span>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold mb-2" id="displayUsername">用户</h1>
                            <p class="text-red-200 text-sm" id="displayUserInfo">加载中...</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center space-x-2 bg-red-900/40 rounded-lg px-4 py-2">
                            <span class="iconify text-yellow-300 text-2xl" data-icon="ri:vip-diamond-fill"></span>
                            <div>
                                <p class="text-yellow-300 text-xs">我的积分</p>
                                <p class="text-2xl font-black text-yellow-200" id="displayPoints">0</p>
                            </div>
                        </div>
                        <button onclick="logout()" class="mt-3 text-red-200 text-xs hover:text-white transition flex items-center ml-auto">
                            <span class="iconify mr-1" data-icon="ri:logout-box-r-line"></span>退出登录
                        </button>
                    </div>
                </div>

                <!-- 选项卡 -->
                <div class="flex border-b">
                    <button id="btn-favorites" onclick="switchTab('favorites')" class="tab-btn tab-active flex-1 py-4 text-center font-medium border-b-2 border-transparent hover:text-red-600 transition">
                        <span class="iconify inline-block mr-1" data-icon="ri:star-line"></span> 我的收藏夹
                    </button>
                    <button id="btn-questions" onclick="switchTab('questions')" class="tab-btn flex-1 py-4 text-center font-medium border-b-2 border-transparent hover:text-red-600 transition">
                        <span class="iconify inline-block mr-1" data-icon="ri:question-answer-line"></span> 我的提问
                    </button>
                </div>

                <!-- 内容区域 -->
                <div class="p-8 min-h-[400px]">
                    <!-- 收藏夹 -->
                    <div id="favorites" class="tab-content">
                        <h2 class="text-xl font-bold mb-6 text-gray-800">我的收藏夹</h2>
                        <div id="collectList" class="space-y-4">
                            <div class="text-center py-8 text-gray-400">
                                <span class="iconify text-4xl inline-block mb-2" data-icon="ri:loader-4-line"></span>
                                <p>加载中...</p>
                            </div>
                        </div>
                    </div>

                    <!-- 我的提问 -->
                    <div id="questions" class="tab-content hidden">
                        <h2 class="text-xl font-bold mb-6 text-gray-800">我的提问</h2>
                        <div id="questionList" class="space-y-4">
                            <div class="text-center py-8 text-gray-400">
                                <span class="iconify text-4xl inline-block mb-2" data-icon="ri:loader-4-line"></span>
                                <p>加载中...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentUser = null;

        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            checkLogin();
        });

        // 检查登录状态
        function checkLogin() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                // 未登录，显示登录提示
                document.getElementById('loginPrompt').classList.remove('hidden');
                document.getElementById('loggedInContent').classList.add('hidden');
                return;
            }

            try {
                currentUser = JSON.parse(userStr);
                // 已登录，显示用户信息
                document.getElementById('loginPrompt').classList.add('hidden');
                document.getElementById('loggedInContent').classList.remove('hidden');

                // 显示用户名
                document.getElementById('displayUsername').textContent = currentUser.username || '用户';

                // 获取最新用户信息（含积分）
                loadUserInfo();

                // 加载收藏和提问数据
                loadCollects();
                loadMyQuestions();
            } catch (e) {
                console.error('解析用户信息失败', e);
                document.getElementById('loginPrompt').classList.remove('hidden');
                document.getElementById('loggedInContent').classList.add('hidden');
            }
        }

        // 获取用户最新信息（含积分）
        function loadUserInfo() {
            if (!currentUser || !currentUser.userId) return;

            $.ajax({
                url: '/user/get/' + currentUser.userId,
                type: 'GET',
                success: function(res) {
                    if (res.code === 1 && res.data) {
                        const user = res.data;
                        document.getElementById('displayPoints').textContent = user.points || 0;
                        
                        // 计算注册天数（简单估算）
                        const regDate = new Date('2026-01-15');
                        const today = new Date();
                        const days = Math.floor((today - regDate) / (1000 * 60 * 60 * 24));
                        document.getElementById('displayUserInfo').textContent = 
                            `手机号：${user.phone || '未绑定'} | 探索南昌历史第 ${days} 天`;
                    }
                }
            });
        }

        // 加载收藏列表
        function loadCollects() {
            if (!currentUser || !currentUser.userId) return;

            $.ajax({
                url: '/api/collect/list?userId=' + currentUser.userId,
                type: 'GET',
                success: function(res) {
                    if (res.code === 1 && res.data) {
                        renderCollects(res.data);
                    } else {
                        $('#collectList').html('<div class="text-center py-8 text-gray-400"><span class="iconify text-4xl inline-block mb-2" data-icon="ri:inbox-line"></span><p>暂无收藏</p></div>');
                    }
                },
                error: function() {
                    $('#collectList').html('<div class="text-center py-8 text-gray-400"><p>加载失败</p></div>');
                }
            });
        }

        // 渲染收藏列表
        function renderCollects(collects) {
            if (!collects || collects.length === 0) {
                $('#collectList').html(`
                    <div class="text-center py-12 text-gray-400">
                        <span class="iconify text-5xl inline-block mb-3" data-icon="ri:star-line"></span>
                        <p class="text-lg">还没有收藏内容</p>
                        <p class="text-sm mt-2">去 <a href="events.html" class="text-red-600 hover:underline">历史事件</a> 或 <a href="figures.html" class="text-red-600 hover:underline">历史人物</a> 中收藏你感兴趣的内容吧</p>
                    </div>
                `);
                return;
            }

            let html = '';
            collects.forEach(function(item) {
                const isEvent = item.contentType === 'event';
                const icon = isEvent ? 'ri:calendar-event-fill' : 'ri:user-star-fill';
                const typeLabel = isEvent ? '事件' : '人物';
                const detailUrl = isEvent 
                    ? 'event-detail.html?id=' + item.contentId 
                    : 'figure-detail.html?id=' + item.contentId;
                const createTime = item.createTime ? formatDateTime(item.createTime) : '';

                html += `
                    <div class="flex justify-between items-center p-4 border rounded-lg hover:bg-gray-50 transition group">
                        <div class="flex items-center space-x-3">
                            <span class="iconify text-xl ${isEvent ? 'text-blue-500' : 'text-red-500'}" data-icon="${icon}"></span>
                            <div>
                                <h3 class="font-bold text-gray-800 group-hover:text-red-700 transition">${item.contentName || '未知'}</h3>
                                <p class="text-sm text-gray-500 mt-1">
                                    <span class="inline-block px-2 py-0.5 rounded text-xs ${isEvent ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600'}">${typeLabel}</span>
                                    <span class="ml-2">收藏于 ${createTime}</span>
                                </p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <a href="${detailUrl}" class="text-red-600 text-sm hover:underline font-medium">查看</a>
                            <button onclick="removeCollect(${item.contentId}, '${item.contentType}')" class="text-gray-400 hover:text-red-500 transition" title="取消收藏">
                                <span class="iconify text-lg" data-icon="ri:delete-bin-line"></span>
                            </button>
                        </div>
                    </div>
                `;
            });
            $('#collectList').html(html);
        }

        // 取消收藏
        function removeCollect(contentId, contentType) {
            if (!confirm('确定取消收藏吗？')) return;

            $.ajax({
                url: '/api/collect/remove',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    userId: currentUser.userId,
                    contentType: contentType,
                    contentId: contentId
                }),
                success: function(res) {
                    if (res.code === 1) {
                        loadCollects(); // 重新加载
                    } else {
                        alert(res.msg || '取消收藏失败');
                    }
                }
            });
        }

        // 加载我的提问
        function loadMyQuestions() {
            if (!currentUser || !currentUser.userId) return;

            $.ajax({
                url: '/api/message/my?userId=' + currentUser.userId + '&page=0&size=50',
                type: 'GET',
                success: function(res) {
                    if (res.code === 1 && res.data && res.data.list) {
                        renderQuestions(res.data.list);
                    } else {
                        $('#questionList').html('<div class="text-center py-8 text-gray-400"><span class="iconify text-4xl inline-block mb-2" data-icon="ri:inbox-line"></span><p>暂无提问</p></div>');
                    }
                },
                error: function() {
                    $('#questionList').html('<div class="text-center py-8 text-gray-400"><p>加载失败</p></div>');
                }
            });
        }

        // 渲染提问列表
        function renderQuestions(questions) {
            if (!questions || questions.length === 0) {
                $('#questionList').html(`
                    <div class="text-center py-12 text-gray-400">
                        <span class="iconify text-5xl inline-block mb-3" data-icon="ri:question-answer-line"></span>
                        <p class="text-lg">还没有提过问题</p>
                        <p class="text-sm mt-2">去 <a href="faq.html" class="text-red-600 hover:underline">互动问答</a> 提出你的疑问吧</p>
                    </div>
                `);
                return;
            }

            let html = '';
            questions.forEach(function(msg) {
                const isReplied = msg.status === 1;
                const statusBadge = isReplied
                    ? '<span class="ml-4 inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800"><span class="iconify mr-1" data-icon="ri:check-line"></span>已回复</span>'
                    : '<span class="ml-4 inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800"><span class="iconify mr-1" data-icon="ri:time-line"></span>待回复</span>';

                const replySection = isReplied && msg.reply ? `
                    <div class="mt-3 bg-gray-50 p-3 rounded text-sm text-gray-700">
                        <strong class="text-red-600">管理员回复：</strong>${escapeHtml(msg.reply)}
                    </div>
                ` : '';

                html += `
                    <div class="p-4 border rounded-lg hover:shadow-sm transition">
                        <h3 class="font-bold text-gray-800">${escapeHtml(msg.content)}</h3>
                        <p class="text-sm text-gray-500 mt-2">
                            提问时间：${formatDateTime(msg.createTime)}
                            ${statusBadge}
                        </p>
                        ${replySection}
                    </div>
                `;
            });
            $('#questionList').html(html);
        }

        // 切换选项卡
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('tab-active');
        }

        // 退出登录
        function logout() {
            if (confirm('确定退出登录吗？')) {
                localStorage.removeItem('currentUser');
                window.location.reload();
            }
        }

        // 格式化时间
        function formatDateTime(dateTimeStr) {
            if (!dateTimeStr) return '';
            const date = new Date(dateTimeStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // HTML 转义防止 XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
