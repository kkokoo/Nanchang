<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南昌历史云志 - 事件详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold tracking-wider text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="index.html">首页</a>
                <a class="hover:text-red-600" href="events.html">历史事件</a>
                <a class="hover:text-red-600" href="special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="figures.html">历史人物</a>
                <a class="hover:text-red-600" href="timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="faq.html">用户留言</a>
                <a class="hover:text-red-600" href="quiz.html">互动答题</a>
                <a class="hover:text-red-600" href="about.html">关于我们</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div id="detailContainer">
            <div class="text-center py-12">加载中...</div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 南昌历史云志 · 历史事件归档计划</p>
        </div>
    </footer>

    <script>
        $(document).ready(function () {
            // ====================== 已全部改成本地图片路径 ======================
            const imageMap = {
                "灌婴筑城": "/images/history/灌婴筑城.jpg",
                "许逊治水": "/images/history/许逊治水.jpg",
                "滕王阁始建": "/images/history/滕王阁始建.jpg",
                "南唐迁都南昌": "/images/history/南唐迁都南昌.jpg",
                "洪都之战": "/images/history/洪都之战.jpg",
                "王守仁平叛": "/images/history/王守仁平叛.jpg",
                "刘显抗倭": "/images/history/刘显抗倭.jpg",
                "八大山人出家": "/images/history/八大山人出家.jpg",
                "程矞采禁烟": "/images/history/程矞采禁烟.jpg",
                "孙中山南昌阅兵": "/images/history/孙中山南昌阅兵.jpg",
                "袁玉冰创办《新江西》": "/images/history/新江西.jpg",
                "扬子洲农民协会成立": "/images/history/扬子洲农民协会.jpg",
                "八一南昌起义": "/images/history/八一南昌起义.jpg",
                "新四军军部进驻南昌": "/images/history/新四军军部进驻南昌.jpg",
                "南昌会战": "/images/history/南昌会战.jpg",
                "新中国第一架飞机首飞成功": "/images/history/新中国第一架飞机首飞成功.jpg",
                "南昌市被列为国家历史文化名城": "/images/history/南昌市被列为国家历史文化名城.jpg",
                "滕王阁景区获评国家5A级景区": "/images/history/滕王阁.jpg"
            };


            // 获取ID
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');

            if (!eventId) {
                $('#detailContainer').html('<div class="text-center py-12 text-red-500">无效的事件ID</div>');
                return;
            }

            // 请求详情
            $.ajax({
                url: "/api/event/" + eventId,
                type: "GET",
                success: function (e) {
                    const imgUrl = imageMap[e.eventName] || "/images/history/暂无图片.jpg";
                    
                    let html = `
                        <div class="bg-white rounded-xl shadow-md p-8">
                            <h1 class="text-3xl font-bold text-center red-accent mb-4">${e.eventName}</h1>
                            <div class="flex justify-center mb-6">
                                <img src="${imgUrl}" 
                                     alt="${e.eventName}" 
                                     class="w-full max-w-lg h-auto rounded-lg shadow">
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-6 text-gray-700">
                                <p><strong>时间：</strong>${e.occurTime}</p>
                                <p><strong>朝代：</strong>${e.dynasty}</p>
                                <p><strong>地点：</strong>${e.location || '南昌'}</p>
                                <p><strong>来源：</strong>${e.source || '无'}</p>
                            </div>
                            <div class="prose max-w-none text-gray-700">
                                <h3 class="text-xl font-bold mb-2">事件过程</h3>
                                <p class="mb-4">${e.process}</p>
                                <h3 class="text-xl font-bold mb-2">历史意义</h3>
                                <p>${e.significance}</p>
                            </div>

                            <!-- 相关人物区域 -->
                            <div id="relatedPersonsSection" class="mt-8 border-t pt-6 hidden">
                                <h3 class="text-xl font-bold mb-4 flex items-center">
                                    <span class="iconify text-red-600 mr-2" data-icon="ri:group-line"></span>
                                    相关人物
                                </h3>
                                <div id="relatedPersonsList" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                </div>
                            </div>

                            <div class="mt-8 flex justify-center space-x-4">
                                <a href="events.html" class="inline-block bg-gray-200 px-6 py-2 rounded hover:bg-gray-300 transition">返回列表</a>
                                <button onclick="handleCollectEvent(${e.eventId}, '${e.eventName}')" id="collectBtn" 
                                    class="inline-block bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700 transition flex items-center">
                                    <span class="iconify mr-1" data-icon="ri:star-line"></span> 收藏事件
                                </button>
                            </div>
                        </div>
                    `;
                    $('#detailContainer').html(html);

                    // 加载相关人物
                    loadRelatedPersons(eventId);

                    // 检查收藏状态
                    checkCollectStatus(eventId, 'event');
                },
                error: function () {
                    $('#detailContainer').html(`
                        <div class="text-center py-12">
                            <p class="text-red-500 mb-4">详情接口加载失败</p>
                            <a href="events.html" class="inline-block bg-gray-200 px-6 py-2 rounded hover:bg-gray-300 transition">返回列表</a>
                        </div>
                    `);
                }
            });
        });

        // 加载相关人物
        function loadRelatedPersons(eventId) {
            $.ajax({
                url: '/api/event/' + eventId + '/related-persons',
                type: 'GET',
                success: function(persons) {
                    if (persons && persons.length > 0) {
                        let html = '';
                        persons.forEach(function(p) {
                            let cover = p.cover || 'https://via.placeholder.com/100x100?text=' + encodeURIComponent(p.name);
                            html += `
                                <a href="figure-detail.html?id=${p.personId}" class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-red-50 hover:border-red-300 transition group">
                                    <img src="${cover}" alt="${p.name}" class="w-12 h-12 rounded-full object-cover border-2 border-gray-200 group-hover:border-red-400 transition"/>
                                    <div>
                                        <p class="font-bold text-gray-800 group-hover:text-red-700 transition">${p.name}</p>
                                        <p class="text-xs text-gray-500">${p.dynasty || ''}</p>
                                    </div>
                                </a>
                            `;
                        });
                        $('#relatedPersonsList').html(html);
                        $('#relatedPersonsSection').removeClass('hidden');
                    }
                }
            });
        }

        // 收藏事件
        function handleCollectEvent(eventId, eventName) {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) {
                alert('请先登录后收藏！');
                window.location.href = 'admin-login.html';
                return;
            }
            const user = JSON.parse(userStr);

            $.ajax({
                url: '/api/collect/add',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    userId: user.userId,
                    contentType: 'event',
                    contentId: eventId,
                    folderName: '默认收藏夹'
                }),
                success: function(res) {
                    if (res.code === 1) {
                        alert('收藏成功！');
                        $('#collectBtn').html('<span class="iconify mr-1" data-icon="ri:star-fill"></span> 已收藏');
                        $('#collectBtn').removeClass('bg-red-600 hover:bg-red-700').addClass('bg-gray-500');
                    } else {
                        alert(res.msg || '收藏失败');
                    }
                },
                error: function() {
                    alert('收藏失败，请稍后重试');
                }
            });
        }

        // 检查收藏状态
        function checkCollectStatus(contentId, contentType) {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return;
            const user = JSON.parse(userStr);

            $.ajax({
                url: '/api/collect/check?userId=' + user.userId + '&contentType=' + contentType + '&contentId=' + contentId,
                type: 'GET',
                success: function(res) {
                    if (res.code === 1 && res.data === true) {
                        $('#collectBtn').html('<span class="iconify mr-1" data-icon="ri:star-fill"></span> 已收藏');
                        $('#collectBtn').removeClass('bg-red-600 hover:bg-red-700').addClass('bg-gray-500');
                    }
                }
            });
        }
    </script>
</body>
</html>
