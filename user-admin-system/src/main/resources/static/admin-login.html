<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录界面 - 英雄城红色记忆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calligraphy-gold {
            font-family: "STKaiti", "KaiTi", "SimHei", sans-serif;
            font-weight: 900;
            color: #f9d342;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3), -1px -1px 1px rgba(200,0,0,0.2);
            letter-spacing: 0.05em;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.25));
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4 bg-cover bg-center"
      style="background-image: url('nanchang-bg.jpg');">
    <div class="max-w-md w-full bg-white/80 backdrop-blur-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col">
        <div class="w-full bg-red-700 flex items-center justify-center py-3 select-none">
            <div class="flex items-center calligraphy-gold space-x-4">
                <span class="text-3xl leading-none">英</span>
                <span class="text-3xl leading-none">雄</span>
                <span class="text-3xl leading-none">城</span>
                <span class="text-3xl leading-none">红</span>
                <span class="text-3xl leading-none">色</span>
                <span class="text-3xl leading-none">记</span>
                <span class="text-3xl leading-none">忆</span>
            </div>
        </div>
        <div class="flex-grow p-6 md:p-8">
            <form class="space-y-5">
                <div>
                    <label class="block text-base font-bold text-gray-800 uppercase mb-2">账号</label>
                    <input id="username" class="w-full bg-white/70 border border-gray-300 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent" placeholder="输入账号" type="text" />
                </div>
                <div>
                    <label class="block text-base font-bold text-gray-800 uppercase mb-2">密码</label>
                    <input id="password" class="w-full bg-white/70 border border-gray-300 rounded-lg px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent" placeholder="输入密码" type="password" />
                </div>


                <div class="flex items-center justify-between text-base">
                    <label class="flex items-center text-gray-800">
                        <input class="mr-2" type="checkbox" required /> 登录即同意平台规定与条款
                    </label>
                    <a class="text-red-600 hover:underline font-medium" href="#">忘记密码？</a>
                </div>

                <button onclick="login()" type="button" class="w-full bg-red-700 text-white font-bold py-3 rounded-lg hover:shadow-lg hover:bg-red-800 transition active:scale-[0.98] text-xl">
                    登录系统
                </button>
            </form>
            <div class="mt-5 text-center">
                <a href="register.html"
                   class="inline-block w-full py-3 px-4 bg-transparent border border-red-600 text-red-600 font-bold text-xl rounded-lg hover:bg-red-50 transition-all duration-200">
                    立即注册
                </a>
            </div>
            <div class="mt-6 pt-6 border-t text-center">
                <a class="text-base text-gray-700 hover:text-gray-900 flex items-center justify-center" href="index.html">
                    ← 返回系统门户首页
                </a>
            </div>
            <p class="mt-3 text-base text-gray-600 text-center" id="currentDate">系统日期：</p>
        </div>
    </div>

    <script>
        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            document.getElementById('currentDate').textContent = `系统日期：${year}年${month}月${day}日`;
        }
        updateDate();

        // ====================== 统一登录：根据user_id自动分流 ======================
        function login() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            if (!username || !password) {
                alert("请输入账号和密码");
                return;
            }

            fetch("http://localhost:8080/user/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 1) {
                    // 登录成功，保存用户信息到 localStorage
                    const user = data.data;
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    // 根据 user_id 分流：user_id=1 为管理员，其他为普通用户
                    if (user.userId === 1) {
                        alert("管理员登录成功！");
                        window.location.href = "admin-dashboard.html";
                    } else {
                        alert("登录成功！");
                        window.location.href = "profile.html";
                    }
                } else {
                    alert("登录失败：" + data.msg);
                }
            })
            .catch(err => {
                alert("后台连接失败：" + err);
            });
        }
    </script>
</body>
</html>
