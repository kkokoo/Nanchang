<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南昌历史云志 - 历史事件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="/js/common.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
        .filter-btn.active {
            background-color: #C53030;
            color: white;
            border-color: #C53030;
        }
        .event-item {
            transition: transform 0.3s ease;
        }
        .event-item:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <!-- 头部导航：和首页结构一致 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold tracking-wider text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="index.html">首页</a>
                <a class="red-accent border-b-2 border-red-600" href="events.html">历史事件</a>
                <a class="hover:text-red-600" href="special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="figures.html">历史人物</a>
                <a class="hover:text-red-600" href="timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="faq.html">互动问答</a>
                <a class="hover:text-red-600" href="about.html">关于我们</a>
            </div>
            <div class="flex items-center space-x-4">
                <a class="p-2 text-gray-500 hover:bg-gray-100 rounded-full" href="search.html"><span class="iconify text-xl" data-icon="ri:search-line"></span></a>
                <a class="bg-red-accent text-white px-4 py-2 rounded-md text-sm hover:bg-red-700 transition" href="admin-login.html">后台管理</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center red-accent mb-8">历史事件库</h1>

    <!-- 筛选栏 -->
    <div class="flex flex-wrap gap-3 justify-center mb-8">
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition active">全部时期</button>
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">建城前(秦之前)</button>
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">灌古城(汉-隋)</button>
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">洪州城(唐-元)</button>
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">南昌府(明-清)</button>
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">红色革命时期</button>
        <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">社会主义建设期</button>
    </div>

    <!-- 事件列表 -->
    <div id="eventList" class="space-y-6">
        <!-- 事件卡片会通过JS动态渲染 -->
    </div>

    <!-- 分页 -->
    <div class="flex justify-center gap-2 mt-12">
        <button class="px-4 py-2 border rounded hover:bg-gray-100 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>上一页</button>
        <button class="px-4 py-2 border rounded hover:bg-gray-100 transition bg-red-accent text-white border-red-accent">1</button>
        <button class="px-4 py-2 border rounded hover:bg-gray-100 transition">2</button>
        <button class="px-4 py-2 border rounded hover:bg-gray-100 transition">3</button>
        <button class="px-4 py-2 border rounded hover:bg-gray-100 transition">下一页</button>
    </div>

     <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 南昌历史云志 · 历史事件归档计划</p>
        </div>
    </footer>

    <script>
        $(document).ready(function () {
            console.log("jQuery 加载成功！");

            // 筛选按钮
            $('.filter-btn').click(function () {
                $('.filter-btn').removeClass('active');
                $(this).addClass('active');
            });
            // 分页按钮交互
            $('.page-btn').click(function () {
                if (!$(this).is(':disabled')) {
                    $('.page-btn').removeClass('active-page');
                    $(this).addClass('active-page');
                    // 这里可以添加分页逻辑
                    // loadEventList(null, $(this).text());
                }
            });

            // 加载事件
            function loadEventList(category = "全部时期", page = 1) {
                $('#eventList').html('<div class="empty-state">加载中...</div>');
                $.ajax({
                    url: "/api/event/list",
                    type: "GET",
                    success: function (list) {
                        console.log("接口请求成功!", list);
                        if (!list || list.length === 0) {
                            $('#eventList').html('<div class="empty-state">暂无事件数据</div>');
                            return;
                        }
                        let html = "";
                        list.forEach(e => {


                            const imgUrl = e.imgUrl || "https://via.placeholder.com/200x120?text=暂无图片";
                            const content = e.content ? e.content.substring(0, 100) + '...' : '暂无简介';
                            html += `
                                <div class="event-item bg-white rounded-xl shadow-md p-6 flex gap-6">
                                    <img src="${imgUrl}" alt="${e.title}" class="w-48 h-32 object-cover rounded-lg flex-shrink-0">
                                    <div class="flex-1">
                                        <h3 class="text-xl font-bold text-gray-800 mb-2">${e.title || '无标题'}</h3>
                                        <div class="flex gap-4 text-sm text-gray-600 mb-3">
                                            <span>时间：${e.eventTime || '未知时间'}</span>
                                            <span>分类：${e.category || '未分类'}</span>
                                        </div>
                                        <p class="text-gray-700 mb-4">${content}</p>
                                        <a href="event-detail.html?id=${e.id}" class="inline-block bg-red-accent text-white px-6 py-2 rounded hover:bg-red-700 transition">查看详情</a>
                                    </div>
                                </div>
                            `;
                        });
                        $('#eventList').html(html);
                    },
                    error: function () {
                        $('#eventList').html('<div class="text-center py-12 text-red-500">加载失败，请稍后重试</div>');
                    }
                });
            }

            // 默认加载全部
            loadEventList();
        });
    </script>
</body>
</html>
