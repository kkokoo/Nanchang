    <script>
        $(document).ready(function () {
            // 页面进入动画
            pageReady();

            const imageMap = {
                "灌婴筑城": "/images/history/灌婴筑城.jpg",
                "许逊治水": "/images/history/许逊治水.jpg",
                "滕王阁始建": "/images/history/滕王阁始建.jpg",
                "南唐迁都南昌": "/images/history/南唐迁都南昌.jpg",
                "洪都之战": "/images/history/洪都之战.jpg",
                "王守仁平叛": "/images/history/王守仁平叛.jpg",
                "刘显抗倭": "/images/history/刘显抗倭.jpg",
                "八大山人出家": "/images/history/八大山人出家.jpg",
                "程矞采禁烟": "/images/history/程矞采禁烟.jpg",
                "孙中山南昌阅兵": "/images/history/孙中山南昌阅兵.jpg",
                "袁玉冰创办《新江西》": "/images/history/新江西.jpg",
                "扬子洲农民协会成立": "/images/history/扬子洲农民协会.jpg",
                "八一南昌起义": "/images/history/八一南昌起义.jpg",
                "新四军军部进驻南昌": "/images/history/新四军军部进驻南昌.jpg",
                "南昌会战": "/images/history/南昌会战.jpg",
                "新中国第一架飞机首飞成功": "/images/history/新中国第一架飞机首飞成功.jpg",
                "南昌市被列为国家历史文化名城": "/images/history/南昌市被列为国家历史文化名城.jpg",
                "滕王阁景区获评国家5A级景区": "/images/history/滕王阁.jpg"
            };

            $('.filter-btn').click(function () {
                $('.filter-btn').removeClass('active');
                $(this).addClass('active');
                loadEvent($(this).text());
            });

                           function loadEvent(dynasty) {
                if (dynasty === undefined) dynasty = "全部时期";
                // 先显示骨架屏
                $('#eventList').html(skeletonCard(4));

                // 缓存 key
                var cacheKey = '/api/event/list?dynasty=' + dynasty;

                // 尝试从缓存读取
                var cached = AppCache.get(cacheKey);
                if (cached) {
                    renderEvents(cached);
                    return;
                }

                // GET 请求：把 dynasty 作为 URL 查询参数
                $.ajax({
                    url: '/api/event/list',
                    method: 'GET',
                    data: { dynasty: dynasty },
                    timeout: 10000,
                    success: function (list) {
                        AppCache.set(cacheKey, list);
                        renderEvents(list);
                    },
                    error: function () {
                        $('#eventList').html(
                            '<div class="text-center py-16 bg-white rounded-xl shadow-md">' +
                            '<span class="iconify text-5xl text-gray-400" data-icon="ri:wifi-off-line"></span>' +
                            '<p class="text-gray-500 mt-4 mb-6">网络加载失败，请检查网络后重试</p>' +
                            '<button onclick="location.reload()" class="bg-red-accent text-white px-6 py-2 rounded hover:bg-red-700 transition">重新加载</button>' +
                            '</div>'
                        );
                    }
                });
            }

            function renderEvents(list) {
                let html = "";
                list.forEach(function (e) {
                    const imgUrl = imageMap[e.eventName] || "/images/history/暂无图片.jpg";
                    const content = e.process ? e.process.substring(0, 100) + '...' : '暂无简介';
                    html += '' +
                        '<div class="event-item bg-white rounded-xl shadow-md p-6 flex gap-6">' +
                        '<img src="' + imgUrl + '" alt="' + e.eventName + '" class="w-48 h-32 object-cover rounded-lg flex-shrink-0">' +
                        '<div class="flex-1">' +
                        '<h3 class="text-xl font-bold text-gray-800 mb-2">' + (e.eventName || '无标题') + '</h3>' +
                        '<div class="flex gap-4 text-sm text-gray-600 mb-3">' +
                        '<span>时间：' + (e.occurTime || '未知时间') + '</span>' +
                        '<span>朝代：' + (e.dynasty || '未知朝代') + '</span>' +
                        '</div>' +
                        '<p class="text-gray-700 mb-4">' + content + '</p>' +
                        '<a href="event-detail.html?id=' + e.eventId + '" class="inline-block bg-red-accent text-white px-6 py-2 rounded hover:bg-red-700 transition">查看详情</a>' +
                        '</div>' +
                        '</div>';
                });
                $('#eventList').html(html || '<div class="text-center py-12 text-gray-500 bg-white rounded-xl shadow-md">暂无事件</div>');
                       }

            loadEvent();   // ← 加上这行，页面打开时自动加载数据
        });              // ← 加上这行，闭合 $(document).ready
    </script>
